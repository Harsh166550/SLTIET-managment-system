<head>
    <meta charset="UTF-8">
    <title>Select Role - SLTIET UMS</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#22245b">

    <style>
        :root {
            --primary: #22245b;
            --accent: #f7941e;
            --white: #ffffff;
            --bg-gradient: linear-gradient(-45deg, #f0f2f5, #e1e8ef, #f7f9fc, #ffffff);
        }

        @keyframes mesh-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: mesh-bg 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--primary);
        }

        h2 {
            margin-bottom: 40px;
            font-size: 2.2rem;
            font-weight: 700;
            animation: fadeIn 0.8s ease-out;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .card {
            padding: 40px 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 220px;
            text-align: center;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            background: var(--white);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            border-color: var(--accent);
        }

        .card img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            object-fit: contain;
            transition: transform 0.4s;
        }

        .card:hover img {
            transform: scale(1.1) rotate(5deg);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        button {
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(247, 148, 30, 0.3);
        }

        .card:hover button {
            background: #ea8a16;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            h2 { font-size: 1.8rem; }
            .card { width: 180px; padding: 30px 20px; }
            .card img { width: 80px; height: 80px; }
        }
    </style>
</head>

<body>

    <h2>Identify Your Role</h2>

<div class="container">

    <!-- Student -->
    <div class="card" onclick="goToStudent()">
        <img src="{{ url_for('static', filename='images/studen.png') }}" alt="Student">
        <h3>Student</h3>
        <button onclick="goToStudent()">Select</button>
    </div>

    <!-- Teacher -->
    <div class="card" onclick="goToTeacher()">
        <img src="{{ url_for('static', filename='images/teacher.png') }}" alt="Teacher">
        <h3>Teacher</h3>
        <button onclick="goToTeacher()">Select</button>
    </div>

</div>

<script>
function goToStudent() {
    window.location.href = "/student"; 
}

function goToTeacher() {
    window.location.href = "/teacher"; 
}
</script>

</body>
</html>
