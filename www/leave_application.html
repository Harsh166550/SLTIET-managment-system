<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Leave Application - SLTIET App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="static/student_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .page-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 100px;
            background: rgba(34, 36, 91, 0.05);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            gap: 6px;
        }
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.1rem; transition: all 0.3s;
        }
        .input-icon-wrapper .form-control { padding-left: 50px; }
        textarea.form-control { padding-top: 15px; }

        /* Success overlay */
        .success-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(16,185,129,0.15); z-index: 9999;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .success-overlay.show { display: flex; }
        .success-card {
            background: white; border-radius: 28px; padding: 50px 40px;
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .success-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg,#10b981,#059669);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2.2rem; color: white;
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
        }
        .success-card h3 { color: #065f46; margin: 0 0 8px; font-size: 1.4rem; }
        .success-card p  { color: #64748b; margin: 0; font-size: 0.95rem; }

        /* Error banner */
        .error-banner {
            display: none; background: #fee2e2; color: #991b1b;
            padding: 12px 18px; border-radius: 14px; margin-bottom: 18px;
            font-size: 0.9rem; font-weight: 600;
            border: 1px solid #fecaca;
        }
        .error-banner.show { display: flex; align-items: center; gap: 10px; }
    </style>

    <script src="config.js"></script>
</head>

<body>

    <div class="header-info">
        <button class="back-link" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h2>Leave Request</h2>
        <p>Submit your absence application</p>
    </div>

    <div class="page-container">
        <div class="glass-card">
            <div class="status-badge">
                <i class="fa-solid fa-circle-info"></i>
                NEW APPLICATION
            </div>

            <!-- Error banner -->
            <div class="error-banner" id="errorBanner">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorMsg">Something went wrong. Please try again.</span>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-user-graduate"></i> Student Name</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="studentName" class="form-control" placeholder="Enter your full name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-graduation-cap"></i> Select Semester</label>
                    <select id="studentSemester" class="form-control" required>
                        <option value="" disabled selected>Select Semester</option>
                        <option value="sem1">Semester 1</option>
                        <option value="sem2">Semester 2</option>
                        <option value="sem3">Semester 3</option>
                        <option value="sem4">Semester 4</option>
                        <option value="sem5">Semester 5</option>
                        <option value="sem6">Semester 6</option>
                        <option value="sem7">Semester 7</option>
                        <option value="sem8">Semester 8</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-chalkboard-user"></i> Select Faculty</label>
                    <select id="targetFaculty" class="form-control" required>
                        <option value="" disabled selected>Loading faculties...</option>
                    </select>
                </div>
            </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-day"></i> From Date</label>
                    <input type="date" id="fromDate" class="form-control">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-check"></i> To Date</label>
                    <input type="date" id="toDate" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-tags"></i> Leave Type</label>
                <select id="leaveType" class="form-control">
                    <option value="" disabled selected>Select category...</option>
                    <option>Sick Leave</option>
                    <option>Personal Leave</option>
                    <option>Emergency</option>
                    <option>Academic Purpose</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-pen-nib"></i> Reason for Leave</label>
                <textarea id="reason" class="form-control" rows="4"
                    placeholder="Briefly describe the reason for your application..."></textarea>
            </div>

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-phone"></i>
                    Parent WhatsApp Number
                </label>
                <input
                    type="text"
                    id="parentNumber"
                    class="form-control"
                    placeholder="91XXXXXXXXXX (country code without +)">
            </div>

            <button class="btn-premium" id="submitBtn" onclick="submitLeave()">
                <i class="fa-solid fa-paper-plane"></i> Submit Application
            </button>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon"><i class="fa-solid fa-check"></i></div>
            <h3>Application Submitted!</h3>
            <p>Your leave request has been sent to the faculty.<br>
               You will be notified once it is reviewed.</p>
        </div>
    </div>

    <script>
        // ── Session check ────────────────────────────────────────────────
        const sName = localStorage.getItem('studentName');
        const sRoll = localStorage.getItem('studentRoll');
        if (!sRoll) {
            window.location.href = 'login.html';
        } else {
            const nameInput = document.getElementById('studentName');
            if (sName) {
                nameInput.value = sName;
                nameInput.readOnly = true;
                nameInput.style.background = '#f1f5f9';
            }
        }

        // ── Load Faculty List ──────────────────────────────────────────
        async function loadFaculties() {
            const select = document.getElementById('targetFaculty');
            try {
                const res = await fetch(API_BASE_URL + '/api/get_all_teachers');
                const teachers = await res.json();
                if (Array.isArray(teachers) && teachers.length > 0) {
                    select.innerHTML = teachers.map(t => `<option value="${t.email}">${t.name} (${t.dept || 'General'})</option>`).join('');
                } else {
                    select.innerHTML = '<option value="" disabled>No faculties available</option>';
                }
            } catch (e) {
                console.error(e);
                select.innerHTML = '<option value="" disabled>Error loading faculties</option>';
            }
        }
        loadFaculties();

        // ── Submit ───────────────────────────────────────────────────────
        async function submitLeave() {
            const name         = document.getElementById('studentName').value.trim();
            const fromDate     = document.getElementById('fromDate').value;
            const toDate       = document.getElementById('toDate').value;
            const type         = document.getElementById('leaveType').value;
            const reason       = document.getElementById('reason').value.trim();
            const roll         = localStorage.getItem('studentRoll') || '';
            const parentNumber = document.getElementById('parentNumber').value.trim();

            const studentSemester = document.getElementById('studentSemester').value;
            const targetFaculty   = document.getElementById('targetFaculty').value;

            // Clear old error
            document.getElementById('errorBanner').classList.remove('show');

            if (
                !name ||
                !fromDate ||
                !toDate ||
                !type ||
                !reason ||
                !parentNumber ||
                !studentSemester ||
                !targetFaculty
            ) {
                showError('Please fill all fields');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            try {
                // ── POST to server (visible to ALL browsers / devices) ───
                const res = await fetch(API_BASE_URL + '/api/submit_leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, roll, from: fromDate, to: toDate, type, reason, parentNumber, semester: studentSemester, targetFaculty })
                });
                const result = await res.json();

                if (result.status !== 'success') {
                    throw new Error(result.message || 'Server error');
                }

                // ── Show success overlay ─────────────────────────────────
                document.getElementById('successOverlay').classList.add('show');

                setTimeout(() => {
                    // Reset form
                    document.getElementById('fromDate').value = '';
                    document.getElementById('toDate').value = '';
                    document.getElementById('leaveType').selectedIndex = 0;
                    document.getElementById('reason').value = '';

                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Application';
                    btn.disabled = false;

                    document.getElementById('successOverlay').classList.remove('show');
                    history.back();
                }, 2400);

            } catch (err) {
                console.error(err);
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Application';
                btn.disabled = false;
                showError('Could not submit. Please check your connection and try again.');
            }
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorBanner').classList.add('show');
        }
    </script>

    <!-- Scroll to Top Button -->
    <button id="globalScrollToTopBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Go to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>
    <script>
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('globalScrollToTopBtn');
            if (btn) {
                if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
