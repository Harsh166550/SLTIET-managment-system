<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Leave Approvals - Faculty Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="stylesheet" href="static/student_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .page-container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 20px; border-radius: 100px; border: 2px solid #e2e8f0;
            background: white; font-weight: 700; font-size: 0.82rem;
            cursor: pointer; color: var(--text-muted); transition: all 0.2s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--primary); color: white; border-color: var(--primary);
        }

        /* ── Leave cards ── */
        .leave-list {
            display: flex; flex-direction: column;
            gap: 16px; min-height: 200px;
        }
        .leave-item {
            background: white; border-radius: 22px;
            border: 1.5px solid #e2e8f0;
            box-shadow: 0 4px 10px -2px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: box-shadow 0.25s, transform 0.25s;
        }
        .leave-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px -8px rgba(34,36,91,0.13);
            border-color: var(--accent, #f7941e);
        }
        .leave-item-header {
            display: flex; justify-content: space-between;
            align-items: center; padding: 20px 24px 16px; cursor: pointer;
        }
        .leave-info { display: flex; align-items: center; gap: 18px; }
        .student-avatar {
            width: 54px; height: 54px;
            background: linear-gradient(135deg, var(--primary), #4f52b2);
            color: white; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 700; flex-shrink: 0;
        }
        .leave-details h4 { margin: 0 0 4px; color: var(--primary); font-size: 1.1rem; font-weight: 700; }
        .leave-details .meta {
            margin: 0; color: var(--text-muted); font-size: 0.85rem;
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .leave-details .meta span { display: flex; align-items: center; gap: 4px; }

        /* Status chips */
        .status-chip {
            padding: 6px 14px; border-radius: 100px;
            font-size: 0.73rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
        }
        .status-pending  { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-declined { background: #fee2e2; color: #991b1b; }

        /* Expandable body */
        .leave-body {
            display: none; padding: 0 24px 22px;
            border-top: 1px solid #f1f5f9;
            animation: slideDown 0.2s ease;
        }
        .leave-body.open { display: block; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px; margin: 16px 0 18px;
        }
        .detail-label {
            font-size: 0.72rem; color: var(--text-muted);
            text-transform: uppercase; font-weight: 700;
            margin-bottom: 4px; display: block;
        }
        .detail-value { font-size: 1rem; color: var(--primary); font-weight: 600; }
        .reason-box {
            background: #f8fafc; padding: 16px 18px; border-radius: 14px;
            font-size: 0.93rem; color: #334155; line-height: 1.65;
            border: 1px solid #e2e8f0; margin-bottom: 20px;
        }

        /* Inline action buttons */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .btn-approve, .btn-decline {
            padding: 14px; border-radius: 16px; border: none;
            font-weight: 700; cursor: pointer; transition: all 0.25s;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 0.95rem; font-family: inherit;
        }
        .btn-approve { background: linear-gradient(135deg,#10b981,#059669); color: white; }
        .btn-decline { background: linear-gradient(135deg,#ef4444,#dc2626); color: white; }
        .btn-approve:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(16,185,129,0.35); }
        .btn-decline:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(239,68,68,0.35); }
        .btn-approve:disabled, .btn-decline:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Delete button */
        .btn-delete-card {
            width: 36px; height: 36px;
            border-radius: 10px; border: none;
            background: #fee2e2; color: #dc2626;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .btn-delete-card:hover {
            background: #ef4444; color: white;
            transform: scale(1.12);
            box-shadow: 0 4px 12px rgba(239,68,68,0.35);
        }

        .decided-label {
            text-align: center; font-weight: 700;
            font-size: 0.9rem; padding: 12px; border-radius: 14px;
        }
        .decided-approved { background: #d1fae5; color: #065f46; }
        .decided-declined { background: #fee2e2; color: #991b1b; }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); width: 100%; }
        .empty-state i { font-size: 5rem; margin-bottom: 24px; opacity: 0.18; }

        /* Loading state */
        .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading-state i { font-size: 3rem; margin-bottom: 16px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b; color: white;
            padding: 14px 28px; border-radius: 100px;
            font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            z-index: 9999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.approved { background: linear-gradient(135deg,#10b981,#059669); }
        .toast.declined { background: linear-gradient(135deg,#ef4444,#dc2626); }

        /* Stats bar */
        .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-chip {
            padding: 10px 18px; border-radius: 14px;
            font-weight: 700; font-size: 0.82rem;
            display: flex; align-items: center; gap: 7px;
        }
        .stat-chip.total    { background: rgba(34,36,91,0.07); color: var(--primary); }
        .stat-chip.pending  { background: #fef3c7; color: #92400e; }
        .stat-chip.approved { background: #d1fae5; color: #065f46; }
        .stat-chip.declined { background: #fee2e2; color: #991b1b; }
    </style>

    <script src="config.js"></script>
</head>

<body>

    <div class="header-info">
        <button class="back-link" onclick="window.location.href='teacher.html'">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h2>Leave Requests</h2>
        <p>Review and process student leave applications</p>
    </div>

    <div class="page-container">

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar"></div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="setFilter('All', this)">All</button>
            <button class="tab-btn" onclick="setFilter('Pending', this)">⏳ Pending</button>
            <button class="tab-btn" onclick="setFilter('Approved', this)">✅ Approved</button>
            <button class="tab-btn" onclick="setFilter('Declined', this)">❌ Declined</button>
        </div>

        <!-- Leave cards list -->
        <div id="leaveList" class="leave-list">
            <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading leave applications...</p>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let allLeaves   = [];   // full server data
        let currentFilter = 'All';
        let openId      = null; // currently expanded card id

        // ── Fetch from server ────────────────────────────────────────────
        async function fetchLeaves() {
            try {
                const email = localStorage.getItem('teacherEmail') || '';
                const res = await fetch(API_BASE_URL + `/api/leaves?email=${encodeURIComponent(email)}`);
                allLeaves = await res.json();
                if (!Array.isArray(allLeaves)) allLeaves = [];
            } catch (e) {
                allLeaves = [];
                console.error('Failed to load leaves:', e);
            }
            renderLeaves();
        }

        // ── Render ───────────────────────────────────────────────────────
        function renderLeaves() {
            const list = document.getElementById('leaveList');

            renderStats();

            // Filter
            const filtered = currentFilter === 'All'
                ? [...allLeaves]
                : allLeaves.filter(l => (l.status || 'Pending') === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-clipboard-check"></i>
                        <h3>${currentFilter === 'All' ? 'All caught up!' : 'No ' + currentFilter + ' requests'}</h3>
                        <p>${currentFilter === 'All'
                            ? 'No leave applications submitted yet.'
                            : 'Nothing in this category.'}</p>
                    </div>`;
                return;
            }

            // Newest first
            const sorted = [...filtered].reverse();
            list.innerHTML = sorted.map(leave => buildCard(leave)).join('');
        }

        function buildCard(leave) {
            const id      = leave.id;
            const name    = leave.name    || 'Student';
            const roll    = leave.roll    || '—';
            const status  = leave.status  || 'Pending';
            const type    = leave.type    || 'General';
            const from    = leave.from    || '—';
            const to      = leave.to      || '—';
            const reason  = leave.reason  || 'No reason provided.';
            const applied = leave.appliedAt || '—';
            const sClass  = status.toLowerCase();
            const initial = name.charAt(0).toUpperCase();
            const isOpen  = (id === openId);

            // Action section
            let actionHTML = '';
            if (status === 'Pending') {
                actionHTML = `
                    <div class="action-btns">
                        <button class="btn-decline" id="declineBtn_${id}"
                            onclick="updateStatus(${id}, 'Declined'); event.stopPropagation();">
                            <i class="fa-solid fa-xmark"></i> Decline
                        </button>
                        <button class="btn-approve" id="approveBtn_${id}"
                            onclick="updateStatus(${id}, 'Approved'); event.stopPropagation();">
                            <i class="fa-solid fa-check"></i> Approve
                        </button>
                    </div>`;
            } else if (status === 'Approved') {
                actionHTML = `<div class="decided-label decided-approved">
                    <i class="fa-solid fa-circle-check"></i> This leave was Approved</div>`;
            } else {
                actionHTML = `<div class="decided-label decided-declined">
                    <i class="fa-solid fa-circle-xmark"></i> This leave was Declined</div>`;
            }

            return `
            <div class="leave-item" id="card_${id}">
                <div class="leave-item-header" onclick="toggleCard(${id})">
                    <div class="leave-info">
                        <div class="student-avatar">${initial}</div>
                        <div class="leave-details">
                            <h4>${name}</h4>
                            <div class="meta">
                                <span><i class="fa-solid fa-id-card"></i> ${roll}</span>
                                <span><i class="fa-solid fa-tag"></i> ${type}</span>
                                <span><i class="fa-solid fa-calendar"></i> ${from} → ${to}</span>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span class="status-chip status-${sClass}">${status}</span>
                        <button class="btn-delete-card" title="Delete application"
                            onclick="deleteLeave(${id}); event.stopPropagation();">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                        <i class="fa-solid fa-chevron-${isOpen ? 'up' : 'down'}"
                            style="color:var(--text-muted);font-size:0.8rem;"></i>
                    </div>
                </div>
                <div class="leave-body ${isOpen ? 'open' : ''}" id="body_${id}">
                    <div class="detail-grid">
                        <div>
                            <span class="detail-label">Student Name</span>
                            <div class="detail-value">${name}</div>
                        </div>
                        <div>
                            <span class="detail-label">Roll Number</span>
                            <div class="detail-value">${roll}</div>
                        </div>
                        <div>
                            <span class="detail-label">From Date</span>
                            <div class="detail-value">${from}</div>
                        </div>
                        <div>
                            <span class="detail-label">To Date</span>
                            <div class="detail-value">${to}</div>
                        </div>
                        <div>
                            <span class="detail-label">Leave Type</span>
                            <div class="detail-value">${type}</div>
                        </div>
                        <div>
                            <span class="detail-label">Semester</span>
                            <div class="detail-value">${leave.semester ? leave.semester.replace('sem', 'Sem ') : '—'}</div>
                        </div>
                        <div>
                            <span class="detail-label">Applied On</span>
                            <div class="detail-value">${applied}</div>
                        </div>
                    </div>
                    <span class="detail-label"><i class="fa-solid fa-pen-nib"></i> Reason</span>
                    <div class="reason-box">${reason}</div>
                    ${actionHTML}
                </div>
            </div>`;
        }

        function toggleCard(id) {
            openId = (openId === id) ? null : id;
            renderLeaves();
        }

        // ── Stats bar ────────────────────────────────────────────────────
        function renderStats() {
            const total    = allLeaves.length;
            const pending  = allLeaves.filter(l => (l.status || 'Pending') === 'Pending').length;
            const approved = allLeaves.filter(l => l.status === 'Approved').length;
            const declined = allLeaves.filter(l => l.status === 'Declined').length;

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-chip total">   <i class="fa-solid fa-list"></i>         ${total} Total</div>
                <div class="stat-chip pending">  <i class="fa-solid fa-clock"></i>        ${pending} Pending</div>
                <div class="stat-chip approved"> <i class="fa-solid fa-circle-check"></i> ${approved} Approved</div>
                <div class="stat-chip declined"> <i class="fa-solid fa-circle-xmark"></i> ${declined} Declined</div>
            `;
        }

        // ── Filter ───────────────────────────────────────────────────────
        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            openId = null;
            renderLeaves();
        }

        // ── Approve / Decline → POST to server ───────────────────────────
        async function updateStatus(id, status) {
            // Disable buttons immediately
            const aBtn = document.getElementById(`approveBtn_${id}`);
            const dBtn = document.getElementById(`declineBtn_${id}`);
            if (aBtn) { aBtn.disabled = true; aBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }
            if (dBtn) { dBtn.disabled = true; dBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }

            try {
                const res = await fetch(API_BASE_URL + '/api/update_leave_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status })
                });
                const result = await res.json();

                if (result.status !== 'success') throw new Error(result.message);

                // Update local copy so re-render is instant
                const lv = allLeaves.find(l => l.id === id);
                if (lv) lv.status = status;

                const lvName = lv ? lv.name : 'Student';
                showToast(
                    status === 'Approved'
                        ? `<i class="fa-solid fa-circle-check"></i> ${lvName}'s leave Approved & student notified!`
                        : `<i class="fa-solid fa-circle-xmark"></i> ${lvName}'s leave Declined & student notified.`,
                    status === 'Approved' ? 'approved' : 'declined'
                );

                openId = null;
                renderLeaves();

            } catch (err) {
                console.error(err);
                showToast('<i class="fa-solid fa-triangle-exclamation"></i> Failed to update. Try again.', '');
                // Re-enable buttons
                if (aBtn) { aBtn.disabled = false; aBtn.innerHTML = '<i class="fa-solid fa-check"></i> Approve'; }
                if (dBtn) { dBtn.disabled = false; dBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> Decline'; }
            }
        }

        // ── Delete leave ─────────────────────────────────────────────────
        async function deleteLeave(id) {
            const lv = allLeaves.find(l => l.id === id);
            const label = lv ? `${lv.name} (${lv.from} → ${lv.to})` : `#${id}`;
            if (!confirm(`Delete leave application for ${label}?\n\nThis cannot be undone.`)) return;

            try {
                const res = await fetch(API_BASE_URL + '/api/delete_leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const result = await res.json();
                if (result.status !== 'success') throw new Error(result.message);

                // Remove from local list
                allLeaves = allLeaves.filter(l => l.id !== id);
                if (openId === id) openId = null;
                renderLeaves();
                showToast('<i class="fa-solid fa-trash"></i> Application deleted', 'declined');
            } catch (err) {
                console.error(err);
                showToast('<i class="fa-solid fa-triangle-exclamation"></i> Could not delete. Try again.', '');
            }
        }

        // ── Toast helper ─────────────────────────────────────────────────
        function showToast(html, cls = '') {
            const t = document.getElementById('toast');
            t.innerHTML = html;
            t.className = 'toast ' + cls + ' show';
            setTimeout(() => { t.classList.remove('show'); }, 3500);
        }

        // ── Auto-refresh every 10 seconds to catch new submissions ───────
        fetchLeaves();
        setInterval(fetchLeaves, 10000);
    </script>

    <!-- Scroll to Top Button -->
    <button id="globalScrollToTopBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Go to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>
    <script>
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('globalScrollToTopBtn');
            if (btn) {
                if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            }
        });
    </script>
</body>

</html>
